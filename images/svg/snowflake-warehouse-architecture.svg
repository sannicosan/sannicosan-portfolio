<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1360" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a2e"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="1360" fill="#ffffff"/>

  <!-- 1. Source -->
  <rect x="210" y="20" width="680" height="80" rx="6" fill="#eef1fc" stroke="#1a1a2e" stroke-width="2"/>
  <text x="550" y="55" text-anchor="middle" font-size="24" fill="#1a1a2e">Source Platform (RDS)</text>
  <text x="550" y="82" text-anchor="middle" font-size="18" fill="#444">Transactional Tables</text>
  <line x1="550" y1="100" x2="550" y2="140" stroke="#1a1a2e" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- 2. DMS -->
  <rect x="210" y="140" width="680" height="80" rx="6" fill="#eef1fc" stroke="#1a1a2e" stroke-width="2"/>
  <text x="550" y="175" text-anchor="middle" font-size="24" fill="#1a1a2e">AWS Database Migration Service</text>
  <text x="550" y="202" text-anchor="middle" font-size="18" fill="#444">Continuous Replication</text>
  <line x1="550" y1="220" x2="550" y2="260" stroke="#1a1a2e" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- 3. S3 Staging -->
  <rect x="210" y="260" width="680" height="80" rx="6" fill="#eef1fc" stroke="#1a1a2e" stroke-width="2"/>
  <text x="550" y="295" text-anchor="middle" font-size="24" fill="#1a1a2e">S3 Staging</text>
  <text x="550" y="322" text-anchor="middle" font-size="18" fill="#444">Landing Zone</text>
  <line x1="550" y1="340" x2="550" y2="380" stroke="#1a1a2e" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- 4. COPY INTO -->
  <rect x="210" y="380" width="680" height="110" rx="6" fill="#eef1fc" stroke="#1a1a2e" stroke-width="2"/>
  <text x="550" y="413" text-anchor="middle" font-size="24" fill="#1a1a2e">Snowflake Ingestion</text>
  <text x="550" y="440" text-anchor="middle" font-size="18" fill="#444">Scheduled COPY INTO Task</text>
  <text x="550" y="463" text-anchor="middle" font-size="18" fill="#444">Automatic schema evolution</text>
  <line x1="550" y1="490" x2="550" y2="530" stroke="#1a1a2e" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- 5. Consolidation -->
  <rect x="210" y="530" width="680" height="110" rx="6" fill="#eef1fc" stroke="#1a1a2e" stroke-width="2"/>
  <text x="550" y="563" text-anchor="middle" font-size="24" fill="#1a1a2e">Consolidation</text>
  <text x="550" y="590" text-anchor="middle" font-size="18" fill="#444">Stream + Merge</text>
  <text x="550" y="613" text-anchor="middle" font-size="18" fill="#444">Custom Snowpark diff/alter tool</text>
  <line x1="550" y1="640" x2="550" y2="680" stroke="#1a1a2e" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- 6. Core layer -->
  <rect x="210" y="680" width="680" height="110" rx="6" fill="#eef1fc" stroke="#1a1a2e" stroke-width="2"/>
  <text x="550" y="713" text-anchor="middle" font-size="24" fill="#1a1a2e">Core Layer — Star Schema</text>
  <text x="550" y="740" text-anchor="middle" font-size="18" fill="#444">Dimension &amp; Fact Tables · CDC Merge</text>
  <text x="550" y="763" text-anchor="middle" font-size="18" fill="#444">Dynamic Tables + Streams (incremental)</text>
  <line x1="550" y1="790" x2="550" y2="830" stroke="#1a1a2e" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- 7. Consumption layer -->
  <rect x="210" y="830" width="680" height="80" rx="6" fill="#eef1fc" stroke="#1a1a2e" stroke-width="2"/>
  <text x="550" y="865" text-anchor="middle" font-size="24" fill="#1a1a2e">Consumption Layer</text>
  <text x="550" y="892" text-anchor="middle" font-size="18" fill="#444">Curated datasources, custom transformations</text>
  <line x1="550" y1="910" x2="550" y2="950" stroke="#1a1a2e" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- 8. Dashboards -->
  <rect x="210" y="950" width="680" height="80" rx="6" fill="#eef1fc" stroke="#1a1a2e" stroke-width="2"/>
  <text x="550" y="985" text-anchor="middle" font-size="24" fill="#1a1a2e">Tableau &amp; Superset Dashboards</text>
  <text x="550" y="1012" text-anchor="middle" font-size="18" fill="#444">Reporting &amp; Analytics</text>

  <!-- Side box: data testing, aligned with rows 5-6 -->
  <rect x="10" y="530" width="175" height="260" rx="6" fill="#fdf3e7" stroke="#1a1a2e" stroke-width="2"/>
  <text x="97" y="565" text-anchor="middle" font-size="19" fill="#1a1a2e" font-weight="bold">Data Testing</text>
  <text x="97" y="595" text-anchor="middle" font-size="15" fill="#444">&amp; Alerting</text>
  <text x="97" y="630" text-anchor="middle" font-size="15" fill="#444">Compare Counts</text>
  <text x="97" y="650" text-anchor="middle" font-size="13" fill="#666">(reconciliation)</text>
  <text x="97" y="685" text-anchor="middle" font-size="15" fill="#444">Test Formulas</text>
  <text x="97" y="705" text-anchor="middle" font-size="13" fill="#666">(transformation)</text>
  <text x="97" y="745" text-anchor="middle" font-size="15" fill="#444">Operational</text>
  <text x="97" y="763" text-anchor="middle" font-size="13" fill="#666">status checks</text>

  <line x1="185" y1="660" x2="205" y2="700" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow1)"/>

  <!-- Result caption -->
  <rect x="60" y="1050" width="840" height="290" rx="8" fill="#f4f7fd" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="480" y="1095" text-anchor="middle" font-size="22" fill="#1a1a2e" font-weight="bold">Result</text>
  <text x="480" y="1133" text-anchor="middle" font-size="20" fill="#1a1a2e">60%+ infrastructure cost reduction</text>
  <text x="480" y="1166" text-anchor="middle" font-size="20" fill="#1a1a2e">98%+ sustained data accuracy</text>
  <text x="480" y="1199" text-anchor="middle" font-size="20" fill="#1a1a2e">~3M students across 1,280 schools</text>
  <text x="480" y="1232" text-anchor="middle" font-size="20" fill="#1a1a2e">~400M rows reconciled across two source systems</text>
  <text x="480" y="1272" text-anchor="middle" font-size="16" fill="#666" font-style="italic">Design principle: scheduled batch + incremental refresh over</text>
  <text x="480" y="1296" text-anchor="middle" font-size="16" fill="#666" font-style="italic">costly continuous micro-batch — no low-latency requirement</text>
</svg>
